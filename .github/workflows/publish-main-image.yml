name: Build and Deploy Main Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: modurelay-main-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: lien0219/modurelay

jobs:
  build:
    name: Build and publish image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve build metadata
        id: build_info
        shell: bash
        run: |
          short_sha="${GITHUB_SHA:0:12}"
          echo "version=main-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Resolve immutable image tag
        id: image
        shell: bash
        run: |
          echo "image=${REGISTRY}/${IMAGE_NAME}:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main
            type=raw,value=sha-${{ github.sha }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          pull: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=modurelay-main
          cache-to: type=gha,mode=max,scope=modurelay-main
          build-args: |
            VERSION=${{ steps.build_info.outputs.version }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.build_info.outputs.date }}
            NPM_CONFIG_REGISTRY=${{ vars.NPM_CONFIG_REGISTRY || 'https://registry.npmmirror.com' }}

  deploy:
    name: Deploy to Tencent Cloud
    needs:
      - build
    if: ${{ vars.ENABLE_PRODUCTION_DEPLOY == 'true' }}
    runs-on: ubuntu-latest
    environment: production

    env:
      SSH_HOST: ${{ secrets.TENCENT_SERVER_HOST }}
      SSH_PORT: ${{ secrets.TENCENT_SERVER_PORT || '22' }}
      SSH_USER: ${{ secrets.TENCENT_SERVER_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.TENCENT_SERVER_SSH_KEY }}
      SSH_KNOWN_HOSTS: ${{ secrets.TENCENT_SERVER_KNOWN_HOSTS }}
      DEPLOY_PATH: ${{ vars.TENCENT_DEPLOY_PATH || '/www/apps/modurelay/deploy' }}
      TARGET_IMAGE: ${{ needs.build.outputs.image }}
      GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
      GHCR_USER: ${{ github.repository_owner }}

    steps:
      - name: Checkout deployment files
        uses: actions/checkout@v6

      - name: Configure SSH
        shell: bash
        run: |
          set -Eeuo pipefail

          for required_name in SSH_HOST SSH_USER SSH_PRIVATE_KEY SSH_KNOWN_HOSTS; do
            if [ -z "${!required_name:-}" ]; then
              echo "::error::Missing required GitHub secret: ${required_name}"
              exit 1
            fi
          done

          if [[ ! "$SSH_PORT" =~ ^[0-9]+$ ]]; then
            echo "::error::TENCENT_SERVER_PORT must be numeric"
            exit 1
          fi

          if [[ ! "$DEPLOY_PATH" =~ ^/[A-Za-z0-9._/-]+$ ]]; then
            echo "::error::TENCENT_DEPLOY_PATH must be an absolute path without spaces"
            exit 1
          fi

          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" | sed 's/\r$//' > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$SSH_KNOWN_HOSTS" | sed 's/\r$//' > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"

          cat > "$HOME/.ssh/config" <<SSH_CONFIG
          Host modurelay-production
            HostName ${SSH_HOST}
            Port ${SSH_PORT}
            User ${SSH_USER}
            IdentityFile ${HOME}/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking yes
            UserKnownHostsFile ${HOME}/.ssh/known_hosts
            ServerAliveInterval 30
            ServerAliveCountMax 3
          SSH_CONFIG
          chmod 600 "$HOME/.ssh/config"

          ssh modurelay-production true

      - name: Upload production deployment files
        shell: bash
        run: |
          set -Eeuo pipefail
          ssh modurelay-production "mkdir -p '${DEPLOY_PATH}'"
          scp -q \
            deploy/docker-compose.prod.yml \
            deploy/deploy-main.sh \
            deploy/production.env.example \
            "modurelay-production:${DEPLOY_PATH}/"

      - name: Login server to GHCR when token is configured
        shell: bash
        run: |
          set -Eeuo pipefail
          if [ -n "$GHCR_READ_TOKEN" ]; then
            printf '%s' "$GHCR_READ_TOKEN" \
              | ssh modurelay-production \
                  "docker login ghcr.io --username '${GHCR_USER}' --password-stdin"
          else
            echo "GHCR_READ_TOKEN is not configured; assuming the package is public or the server is already logged in."
          fi

      - name: Deploy immutable image
        shell: bash
        run: |
          set -Eeuo pipefail
          ssh modurelay-production \
            "cd '${DEPLOY_PATH}' && chmod 700 deploy-main.sh && ./deploy-main.sh '${TARGET_IMAGE}'"
