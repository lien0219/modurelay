name: Publish Main Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: modurelay-main-image
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: lien0219/modurelay

jobs:
  publish:
    name: Build and publish GHCR image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve image version
        id: image_version
        shell: bash
        run: |
          set -Eeuo pipefail

          version="$(tr -d '[:space:]' < deploy/IMAGE_VERSION)"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::deploy/IMAGE_VERSION must be a semantic version such as 0.0.1"
            exit 1
          fi

          publish_version=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            publish_version=true
          elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            publish_version=true
          elif ! git diff --quiet "${{ github.event.before }}" "${{ github.sha }}" -- deploy/IMAGE_VERSION; then
            publish_version=true
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "publish_version=$publish_version" >> "$GITHUB_OUTPUT"
          echo "Version: $version"
          echo "Publish version tag: $publish_version"

      - name: Resolve build metadata
        id: build_info
        shell: bash
        run: |
          short_sha="${GITHUB_SHA:0:12}"
          echo "version=main-v${{ steps.image_version.outputs.version }}-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=main-v${{ steps.image_version.outputs.version }},enable=${{ steps.image_version.outputs.publish_version == 'true' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          pull: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=modurelay-main
          cache-to: type=gha,mode=max,scope=modurelay-main
          build-args: |
            VERSION=${{ steps.build_info.outputs.version }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.build_info.outputs.date }}
            NPM_CONFIG_REGISTRY=${{ vars.NPM_CONFIG_REGISTRY || 'https://registry.npmmirror.com' }}
