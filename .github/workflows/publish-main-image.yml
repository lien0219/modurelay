name: Publish Main Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: modurelay-main-image
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: lien0219/modurelay

jobs:
  publish:
    name: Build and publish GHCR image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve build metadata
        id: build_info
        shell: bash
        run: |
          short_sha="${GITHUB_SHA:0:12}"
          echo "version=main-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main
            type=raw,value=sha-${{ github.sha }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          pull: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=modurelay-main
          cache-to: type=gha,mode=max,scope=modurelay-main
          build-args: |
            VERSION=${{ steps.build_info.outputs.version }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.build_info.outputs.date }}
            NPM_CONFIG_REGISTRY=${{ vars.NPM_CONFIG_REGISTRY || 'https://registry.npmmirror.com' }}
