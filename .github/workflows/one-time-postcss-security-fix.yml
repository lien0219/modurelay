name: One-time PostCSS Security Fix

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: one-time-postcss-security-fix
  cancel-in-progress: false

jobs:
  update-postcss:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout develop
        uses: actions/checkout@v6
        with:
          ref: develop
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Upgrade PostCSS manifest constraint
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs')
          const path = 'frontend/package.json'
          const pkg = JSON.parse(fs.readFileSync(path, 'utf8'))

          pkg.devDependencies ||= {}
          pkg.devDependencies.postcss = '^8.5.12'
          pkg.pnpm ||= {}
          pkg.pnpm.overrides ||= {}
          pkg.pnpm.overrides.postcss = '8.5.12'

          fs.writeFileSync(path, `${JSON.stringify(pkg, null, 2)}\n`)
          NODE

      - name: Regenerate lockfile
        working-directory: frontend
        run: |
          pnpm config set registry https://registry.npmjs.org
          pnpm install --lockfile-only
          pnpm install --frozen-lockfile

      - name: Verify patched PostCSS version
        working-directory: frontend
        shell: bash
        run: |
          resolved="$(pnpm list postcss --depth Infinity --json | node -e '
            let input = "";
            process.stdin.on("data", chunk => input += chunk);
            process.stdin.on("end", () => {
              const data = JSON.parse(input);
              const versions = new Set();
              const visit = value => {
                if (!value || typeof value !== "object") return;
                for (const [key, child] of Object.entries(value)) {
                  if (key === "postcss" && child && typeof child === "object" && child.version) {
                    versions.add(child.version);
                  }
                  visit(child);
                }
              };
              visit(data);
              process.stdout.write([...versions].sort().join("\n"));
            });
          ' )"

          printf 'Resolved PostCSS versions:\n%s\n' "$resolved"
          if printf '%s\n' "$resolved" | grep -Ev '^8\.5\.(1[2-9]|[2-9][0-9])$' | grep -q .; then
            echo '::error::A vulnerable PostCSS version is still present'
            exit 1
          fi

      - name: Run frontend audit policy
        working-directory: frontend
        run: pnpm audit --prod --audit-level=high --json > audit.json || true

      - name: Check audit exceptions
        run: |
          python tools/check_pnpm_audit_exceptions.py \
            --audit frontend/audit.json \
            --exceptions .github/audit-exceptions.yml

      - name: Remove temporary files and workflow
        shell: bash
        run: |
          rm -f frontend/audit.json
          rm -f .github/workflows/one-time-postcss-security-fix.yml

      - name: Commit security update
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add frontend/package.json frontend/pnpm-lock.yaml .github/workflows/one-time-postcss-security-fix.yml

          if git diff --cached --quiet; then
            echo 'PostCSS is already patched; nothing to commit.'
            exit 0
          fi

          git commit -m 'fix(frontend): upgrade PostCSS to patched release'
          git push origin HEAD:develop
