name: One-time homepage quota button patch

on:
  push:
    branches:
      - develop
    paths:
      - .github/workflows/one-time-add-key-usage-cta.yml

permissions:
  contents: write

jobs:
  patch-homepage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Add quota query button
        shell: python
        run: |
          from pathlib import Path

          path = Path("frontend/src/views/HomeView.vue")
          content = path.read_text(encoding="utf-8")

          old_cta = '''            <!-- CTA Button -->
            <div>
              <router-link
                :to="isAuthenticated ? dashboardPath : '/login'"
                class="btn btn-primary px-8 py-3 text-base shadow-lg shadow-primary-500/30"
              >
                {{ isAuthenticated ? t('home.goToDashboard') : t('home.getStarted') }}
                <Icon name="arrowRight" size="md" class="ml-2" :stroke-width="2" />
              </router-link>
            </div>'''

          new_cta = '''            <!-- CTA Buttons -->
            <div class="flex flex-wrap items-center justify-center gap-3 lg:justify-start">
              <router-link
                :to="isAuthenticated ? dashboardPath : '/login'"
                class="btn btn-primary px-8 py-3 text-base shadow-lg shadow-primary-500/30"
              >
                {{ isAuthenticated ? t('home.goToDashboard') : t('home.getStarted') }}
                <Icon name="arrowRight" size="md" class="ml-2" :stroke-width="2" />
              </router-link>
              <router-link
                to="/key-usage"
                class="btn border border-primary-500 bg-white/80 px-8 py-3 text-base text-primary-600 shadow-sm transition-all hover:bg-primary-50 dark:bg-dark-900/80 dark:text-primary-400 dark:hover:bg-dark-800"
              >
                <Icon name="chart" size="md" class="mr-2" :stroke-width="2" />
                {{ quotaButtonLabel }}
              </router-link>
            </div>'''

          if old_cta not in content:
              raise SystemExit("Expected homepage CTA block was not found")
          content = content.replace(old_cta, new_cta, 1)

          old_i18n = "const { t } = useI18n()"
          new_i18n = "const { t, locale } = useI18n()"
          if old_i18n not in content:
              raise SystemExit("Expected useI18n declaration was not found")
          content = content.replace(old_i18n, new_i18n, 1)

          anchor = "const siteSubtitle = computed(() => appStore.cachedPublicSettings?.site_subtitle || brand.slogan)\n"
          quota_label = '''const quotaButtonLabel = computed(() => {
  const currentLocale = String(locale.value).toLowerCase()
  if (currentLocale.startsWith('zh')) return '额度查询'
  if (currentLocale.startsWith('ja')) return '残高照会'
  return 'Check quota'
})
'''
          if anchor not in content:
              raise SystemExit("Expected site subtitle declaration was not found")
          content = content.replace(anchor, anchor + quota_label, 1)

          path.write_text(content, encoding="utf-8")

      - name: Remove one-time workflow
        run: rm .github/workflows/one-time-add-key-usage-cta.yml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/src/views/HomeView.vue .github/workflows/one-time-add-key-usage-cta.yml
          git commit -m "feat(frontend): add quota query button to homepage"
          git push origin HEAD:develop
