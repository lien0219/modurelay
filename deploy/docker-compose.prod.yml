name: modurelay

services:
  modurelay:
    image: "${MODURELAY_IMAGE:-ghcr.io/lien0219/modurelay:main}"
    container_name: modurelay
    restart: unless-stopped
    stop_grace_period: 30s

    extra_hosts:
      - "host.docker.internal:host-gateway"

    ports:
      - "${BIND_HOST:-127.0.0.1}:${SERVER_PORT:-8080}:8080"

    volumes:
      - ./data:/app/data

    # Provider, payment and security variables remain in the server-side .env.
    # Explicit values below enforce production-safe defaults for core services.
    env_file:
      - ./.env

    environment:
      AUTO_SETUP: "true"

      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8080"
      SERVER_MODE: "release"
      RUN_MODE: "${RUN_MODE:-standard}"
      ENABLE_SERVER_TIMING: "${ENABLE_SERVER_TIMING:-false}"
      TZ: "${TZ:-Asia/Shanghai}"

      LOG_LEVEL: "${LOG_LEVEL:-info}"
      LOG_FORMAT: "${LOG_FORMAT:-json}"
      LOG_CALLER: "${LOG_CALLER:-false}"
      LOG_OUTPUT_TO_STDOUT: "${LOG_OUTPUT_TO_STDOUT:-true}"
      LOG_OUTPUT_TO_FILE: "${LOG_OUTPUT_TO_FILE:-false}"

      DATABASE_HOST: "postgres"
      DATABASE_PORT: "5432"
      DATABASE_USER: "${POSTGRES_USER:-sub2api}"
      DATABASE_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      DATABASE_DBNAME: "${POSTGRES_DB:-sub2api}"
      DATABASE_SSLMODE: "disable"
      DATABASE_MAX_OPEN_CONNS: "${DATABASE_MAX_OPEN_CONNS:-30}"
      DATABASE_MAX_IDLE_CONNS: "${DATABASE_MAX_IDLE_CONNS:-10}"
      DATABASE_CONN_MAX_LIFETIME_MINUTES: "${DATABASE_CONN_MAX_LIFETIME_MINUTES:-30}"
      DATABASE_CONN_MAX_IDLE_TIME_MINUTES: "${DATABASE_CONN_MAX_IDLE_TIME_MINUTES:-5}"

      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_USERNAME: "${REDIS_USERNAME:-}"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      REDIS_DB: "${REDIS_DB:-0}"
      REDIS_POOL_SIZE: "${REDIS_POOL_SIZE:-100}"
      REDIS_MIN_IDLE_CONNS: "${REDIS_MIN_IDLE_CONNS:-10}"
      REDIS_ENABLE_TLS: "${REDIS_ENABLE_TLS:-false}"

      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@modurelay.local}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required}"
      JWT_EXPIRE_HOUR: "${JWT_EXPIRE_HOUR:-24}"
      TOTP_ENCRYPTION_KEY: "${TOTP_ENCRYPTION_KEY:?TOTP_ENCRYPTION_KEY is required}"
      SETUP_MIGRATION_TIMEOUT_SECONDS: "${SETUP_MIGRATION_TIMEOUT_SECONDS:-60}"

      SERVER_MAX_REQUEST_BODY_SIZE: "${SERVER_MAX_REQUEST_BODY_SIZE:-268435456}"
      GATEWAY_MAX_BODY_SIZE: "${GATEWAY_MAX_BODY_SIZE:-268435456}"

      HTTP_PROXY: "${HTTP_PROXY:-}"
      HTTPS_PROXY: "${HTTPS_PROXY:-}"
      ALL_PROXY: "${ALL_PROXY:-}"
      NO_PROXY: "${NO_PROXY:-localhost,127.0.0.1,::1,modurelay,postgres,redis}"
      http_proxy: "${http_proxy:-}"
      https_proxy: "${https_proxy:-}"
      all_proxy: "${all_proxy:-}"
      no_proxy: "${no_proxy:-localhost,127.0.0.1,::1,modurelay,postgres,redis}"

      GATEWAY_OPENAI_RESPONSE_HEADER_TIMEOUT: "${GATEWAY_OPENAI_RESPONSE_HEADER_TIMEOUT:-0}"
      GATEWAY_OPENAI_HTTP2_ENABLED: "${GATEWAY_OPENAI_HTTP2_ENABLED:-true}"
      GATEWAY_OPENAI_HTTP2_ALLOW_PROXY_FALLBACK_TO_HTTP1: "${GATEWAY_OPENAI_HTTP2_ALLOW_PROXY_FALLBACK_TO_HTTP1:-true}"
      GATEWAY_OPENAI_HTTP2_FALLBACK_ERROR_THRESHOLD: "${GATEWAY_OPENAI_HTTP2_FALLBACK_ERROR_THRESHOLD:-2}"
      GATEWAY_OPENAI_HTTP2_FALLBACK_WINDOW_SECONDS: "${GATEWAY_OPENAI_HTTP2_FALLBACK_WINDOW_SECONDS:-60}"
      GATEWAY_OPENAI_HTTP2_FALLBACK_TTL_SECONDS: "${GATEWAY_OPENAI_HTTP2_FALLBACK_TTL_SECONDS:-600}"
      GATEWAY_OPENAI_PROXY_STREAM_CIRCUIT_FAILURE_THRESHOLD: "${GATEWAY_OPENAI_PROXY_STREAM_CIRCUIT_FAILURE_THRESHOLD:-2}"
      GATEWAY_OPENAI_PROXY_STREAM_CIRCUIT_WINDOW_SECONDS: "${GATEWAY_OPENAI_PROXY_STREAM_CIRCUIT_WINDOW_SECONDS:-60}"
      GATEWAY_OPENAI_PROXY_STREAM_CIRCUIT_TTL_SECONDS: "${GATEWAY_OPENAI_PROXY_STREAM_CIRCUIT_TTL_SECONDS:-600}"
      GATEWAY_IMAGE_STREAM_DATA_INTERVAL_TIMEOUT: "${GATEWAY_IMAGE_STREAM_DATA_INTERVAL_TIMEOUT:-900}"
      GATEWAY_IMAGE_STREAM_KEEPALIVE_INTERVAL: "${GATEWAY_IMAGE_STREAM_KEEPALIVE_INTERVAL:-10}"
      GATEWAY_IMAGE_CONCURRENCY_ENABLED: "${GATEWAY_IMAGE_CONCURRENCY_ENABLED:-false}"
      GATEWAY_IMAGE_CONCURRENCY_MAX_CONCURRENT_REQUESTS: "${GATEWAY_IMAGE_CONCURRENCY_MAX_CONCURRENT_REQUESTS:-0}"
      GATEWAY_IMAGE_CONCURRENCY_OVERFLOW_MODE: "${GATEWAY_IMAGE_CONCURRENCY_OVERFLOW_MODE:-reject}"
      GATEWAY_IMAGE_CONCURRENCY_WAIT_TIMEOUT_SECONDS: "${GATEWAY_IMAGE_CONCURRENCY_WAIT_TIMEOUT_SECONDS:-30}"
      GATEWAY_IMAGE_CONCURRENCY_MAX_WAITING_REQUESTS: "${GATEWAY_IMAGE_CONCURRENCY_MAX_WAITING_REQUESTS:-100}"

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "5", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 15s
      timeout: 8s
      retries: 5
      start_period: 45s

    ulimits:
      nofile:
        soft: 65535
        hard: 65535

    mem_limit: "${MODURELAY_MEMORY_LIMIT:-1536m}"
    cpus: "${MODURELAY_CPU_LIMIT:-1.50}"

    logging:
      driver: json-file
      options:
        max-size: "${DOCKER_LOG_MAX_SIZE:-20m}"
        max-file: "${DOCKER_LOG_MAX_FILE:-3}"

    networks:
      - modurelay-network

  postgres:
    image: postgres:18-alpine
    container_name: modurelay-postgres
    restart: unless-stopped
    stop_grace_period: 60s

    volumes:
      - ./postgres_data:/var/lib/postgresql/data

    environment:
      PGDATA: "/var/lib/postgresql/data"
      POSTGRES_USER: "${POSTGRES_USER:-sub2api}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      POSTGRES_DB: "${POSTGRES_DB:-sub2api}"
      TZ: "${TZ:-Asia/Shanghai}"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sub2api} -d ${POSTGRES_DB:-sub2api}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

    mem_limit: "${POSTGRES_MEMORY_LIMIT:-1024m}"
    cpus: "${POSTGRES_CPU_LIMIT:-1.00}"

    logging:
      driver: json-file
      options:
        max-size: "${DOCKER_LOG_MAX_SIZE:-20m}"
        max-file: "${DOCKER_LOG_MAX_FILE:-3}"

    networks:
      - modurelay-network

  redis:
    image: redis:8-alpine
    container_name: modurelay-redis
    restart: unless-stopped
    stop_grace_period: 30s

    volumes:
      - ./redis_data:/data

    command: >
      sh -c '
        redis-server \
        --save 60 1 \
        --appendonly yes \
        --appendfsync everysec \
        --maxmemory "$${REDIS_MAXMEMORY:-384mb}" \
        --maxmemory-policy "$${REDIS_MAXMEMORY_POLICY:-allkeys-lru}" \
        $${REDIS_PASSWORD:+--requirepass "$$REDIS_PASSWORD"}'

    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      REDISCLI_AUTH: "${REDIS_PASSWORD:-}"
      REDIS_MAXMEMORY: "${REDIS_MAXMEMORY:-384mb}"
      REDIS_MAXMEMORY_POLICY: "${REDIS_MAXMEMORY_POLICY:-allkeys-lru}"
      TZ: "${TZ:-Asia/Shanghai}"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

    mem_limit: "${REDIS_MEMORY_LIMIT:-512m}"
    cpus: "${REDIS_CPU_LIMIT:-0.50}"

    logging:
      driver: json-file
      options:
        max-size: "${DOCKER_LOG_MAX_SIZE:-20m}"
        max-file: "${DOCKER_LOG_MAX_FILE:-3}"

    networks:
      - modurelay-network

networks:
  modurelay-network:
    driver: bridge
